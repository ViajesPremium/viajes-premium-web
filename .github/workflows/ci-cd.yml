name: CI/CD

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: viajes-premium-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VPS_FRONTEND_DIR: /var/www/viajes-premium/viajes-premium
  VPS_BACKEND_DIR: /var/www/viajes-premium/backend
  VPS_FRONTEND_PROCESS: viajes-premium
  VPS_BACKEND_SERVICE: viajes-premium-backend.service
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.DEPLOY_SSH_KEY || secrets.SSH_KEY }}
  VPS_HOST: ${{ secrets.VPS_HOST || secrets.SSH_HOST || secrets.DEPLOY_HOST }}
  VPS_PORT: ${{ secrets.VPS_PORT || secrets.SSH_PORT || secrets.DEPLOY_PORT }}
  VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER || secrets.DEPLOY_USER }}
  VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.SSH_PASSWORD || secrets.DEPLOY_PASSWORD }}

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build backend
        working-directory: backend
        run: go build -o /tmp/api ./cmd/api

  deploy:
    name: Deploy to VPS
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        id: deploy-secrets
        run: |
          missing=0

          if [ -n "${VPS_SSH_KEY}" ]; then
            echo "auth_method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "${VPS_PASSWORD}" ]; then
            echo "auth_method=password" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Missing deploy auth secret: VPS_SSH_KEY, SSH_PRIVATE_KEY, DEPLOY_SSH_KEY, SSH_KEY, VPS_PASSWORD, SSH_PASSWORD, or DEPLOY_PASSWORD"
            missing=1
          fi

          if [ -z "${VPS_HOST}" ]; then
            echo "::warning::Missing deploy secret: VPS_HOST, SSH_HOST, or DEPLOY_HOST"
            missing=1
          fi

          if [ -z "${VPS_PORT}" ]; then
            echo "::warning::Missing deploy secret: VPS_PORT, SSH_PORT, or DEPLOY_PORT"
            missing=1
          fi

          if [ -z "${VPS_USER}" ]; then
            echo "::warning::Missing deploy secret: VPS_USER, SSH_USER, or DEPLOY_USER"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped because one or more VPS secrets are not configured."
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        if: steps.deploy-secrets.outputs.should_deploy == 'true' && steps.deploy-secrets.outputs.auth_method == 'key'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.VPS_SSH_KEY }}

      - name: Install password SSH support
        if: steps.deploy-secrets.outputs.should_deploy == 'true' && steps.deploy-secrets.outputs.auth_method == 'password'
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust VPS host key
        if: steps.deploy-secrets.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Sync frontend
        if: steps.deploy-secrets.outputs.should_deploy == 'true'
        env:
          DEPLOY_AUTH_METHOD: ${{ steps.deploy-secrets.outputs.auth_method }}
          SSHPASS: ${{ env.VPS_PASSWORD }}
        run: |
          if [ "${DEPLOY_AUTH_METHOD}" = "password" ]; then
            rsync_ssh="sshpass -e ssh -p ${VPS_PORT}"
          else
            rsync_ssh="ssh -p ${VPS_PORT}"
          fi

          rsync -az --delete -e "${rsync_ssh}" \
            --exclude '.next/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.local' \
            frontend/ "${VPS_USER}@${VPS_HOST}:${VPS_FRONTEND_DIR}/"

      - name: Sync backend
        if: steps.deploy-secrets.outputs.should_deploy == 'true'
        env:
          DEPLOY_AUTH_METHOD: ${{ steps.deploy-secrets.outputs.auth_method }}
          SSHPASS: ${{ env.VPS_PASSWORD }}
        run: |
          if [ "${DEPLOY_AUTH_METHOD}" = "password" ]; then
            rsync_ssh="sshpass -e ssh -p ${VPS_PORT}"
          else
            rsync_ssh="ssh -p ${VPS_PORT}"
          fi

          rsync -az --delete -e "${rsync_ssh}" \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude 'bin/' \
            --exclude 'api.exe' \
            backend/ "${VPS_USER}@${VPS_HOST}:${VPS_BACKEND_DIR}/"

      - name: Build and restart services on VPS
        if: steps.deploy-secrets.outputs.should_deploy == 'true'
        env:
          DEPLOY_AUTH_METHOD: ${{ steps.deploy-secrets.outputs.auth_method }}
          SSHPASS: ${{ env.VPS_PASSWORD }}
        run: |
          if [ "${DEPLOY_AUTH_METHOD}" = "password" ]; then
            ssh_cmd="sshpass -e ssh -p ${VPS_PORT}"
          else
            ssh_cmd="ssh -p ${VPS_PORT}"
          fi

          ${ssh_cmd} "${VPS_USER}@${VPS_HOST}" "VPS_FRONTEND_DIR='${VPS_FRONTEND_DIR}' VPS_BACKEND_DIR='${VPS_BACKEND_DIR}' VPS_FRONTEND_PROCESS='${VPS_FRONTEND_PROCESS}' VPS_BACKEND_SERVICE='${VPS_BACKEND_SERVICE}' bash -se" <<'EOF'
          set -euo pipefail

          cd "$VPS_FRONTEND_DIR"
          rm -rf .next
          npm install --no-audit --no-fund
          npm run build
          pm2 restart "$VPS_FRONTEND_PROCESS" --update-env

          cd "$VPS_BACKEND_DIR"
          rm -rf bin
          mkdir -p bin
          go build -o bin/api ./cmd/api
          systemctl restart "$VPS_BACKEND_SERVICE"
          EOF
